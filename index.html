<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuolaidų Kortelės - Galerija</title>
    <style>
        /* CSS kodas lieka toks pat kaip anksčiau */
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        h1.page-title {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            color: #333;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* Sumažintas min plotis logotipams */
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto 20px auto;
        }
        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            cursor: pointer;
            background-color: #fff;
            /* Galima pridėti aspect-ratio, kad logotipai būtų vienodesni */
            aspect-ratio: 3 / 2; /* Plotis 3, aukštis 2 - parinkite pagal savo logotipus */
            display: flex; /* Kad paveikslėlis centre būtų */
            justify-content: center;
            align-items: center;
        }
        .gallery-item:hover {
            transform: scale(1.05);
        }
        .gallery-item:focus {
            outline: 2px solid #0056b3;
            outline-offset: 2px;
        }
        .gallery-item img {
            display: block;
            /* Pakeista, kad logotipai tilptų, bet neišsikraipytų */
            max-width: 80%;
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain; /* Išlaiko proporcijas tilpdamas */
        }
        /* Lightbox styles */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }
        .lightbox-content {
            display: flex;
            flex-direction: column;
            max-width: 90%;
            max-height: 90%;
            margin: auto;
            position: relative;
        }
        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            display: block;
            animation: lightboxFadeIn 0.3s ease-in-out;
        }
        @keyframes lightboxFadeIn {
          from { opacity: 0; transform: scale(0.95); }
          to { opacity: 1; transform: scale(1); }
        }
        .lightbox-close {
            color: white;
            position: absolute;
            top: -10px;
            right: -5px;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            padding: 5px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .lightbox-close:hover {
            color: #ddd;
            background-color: rgba(0,0,0,0.5);
        }
        .lightbox-close:focus {
             outline: 2px solid white;
             outline-offset: 1px;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); /* Dar mažesnis min plotis */
                gap: 10px;
                padding: 10px;
            }
             h1.page-title {
                font-size: 1.8em;
            }
            .lightbox-close {
                 top: 10px;
                 right: 15px;
                 font-size: 30px;
                 width: 30px;
                 height: 30px;
            }
        }
    </style>
</head>
<body>

    <h1 class="page-title">Nuolaidų Kortelės</h1>

    <div class="gallery">
        <!-- Atkreipkite dėmesį į src, alt, data-lightbox-src ir data-lightbox-alt -->
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/iki_logo.png" alt="IKI parduotuvės logotipas"
                 data-lightbox-src="img/iki.jpg"
                 data-lightbox-alt="IKI nuolaidų kortelė">
        </div>
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/maxima_logo.png" alt="Maxima parduotuvės logotipas"
                 data-lightbox-src="img/maxima.jpg"
                 data-lightbox-alt="Maxima Ačiū kortelė">
        </div>
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/lidl_logo.png" alt="Lidl parduotuvės logotipas"
                 data-lightbox-src="img/lidl.jpg"
                 data-lightbox-alt="Lidl Plus kortelė (iliustracija)">
        </div>
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/norfa_logo.png" alt="Norfa parduotuvės logotipas"
                 data-lightbox-src="img/norfa.jpg"
                 data-lightbox-alt="Norfa nuolaidų kortelė">
        </div>
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/promo_logo.png" alt="Promo Cash&Carry logotipas"
                 data-lightbox-src="img/promo.jpg"
                 data-lightbox-alt="Promo Cash&Carry kortelė">
        </div>
        <div class="gallery-item" tabindex="0" role="button">
            <img src="img/senukai_logo.png" alt="Senukai parduotuvės logotipas"
                 data-lightbox-src="img/senukai.jpg"
                 data-lightbox-alt="Senukai Mylimiausia kortelė">
        </div>
        <!-- Čia galite pridėti daugiau elementų pagal tą pačią struktūrą -->
    </div>

    <!-- Lightbox container -->
    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" title="Uždaryti">×</span>
        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-image" src="" alt="">
        </div>
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxContent = document.querySelector('.lightbox-content');
        const lightboxClose = document.querySelector('.lightbox-close');
        const galleryItems = document.querySelectorAll('.gallery-item');

        // openLightbox funkcija dabar priima SRC ir ALT lightbox paveikslėliui
        function openLightbox(imgSrc, altText) {
            lightboxImg.src = imgSrc;
            lightboxImg.alt = altText;
            lightbox.style.display = 'flex';
            lightboxClose.focus();
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxImg.src = "";
            lightboxImg.alt = "";
        }

        galleryItems.forEach(item => {
            // Funkcija, kurią naudosime tiek click, tiek keydown eventams
            const handleInteraction = (event) => {
                const img = event.currentTarget.querySelector('img');
                if (img) {
                    // Gauname reikšmes iš data-* atributų
                    const lightboxSrc = img.dataset.lightboxSrc;
                    const lightboxAlt = img.dataset.lightboxAlt;

                    // Tikriname ar radome kelią iki lightbox paveikslėlio
                    if (lightboxSrc) {
                        // Kviečiame openLightbox su reikšmėmis iš data-* atributų
                        // Jei data-lightbox-alt nėra, naudojame logo alt kaip atsarginį variantą
                        openLightbox(lightboxSrc, lightboxAlt || img.alt);
                    } else {
                        console.warn("Nerastas data-lightbox-src atributas ant:", img);
                    }
                }
            };

            // Pelės paspaudimo klausytojas
            item.addEventListener('click', handleInteraction);

            // Klaviatūros paspaudimo klausytojas
            item.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    handleInteraction(event); // Naudojame tą pačią funkciją
                }
            });
        });

        // Kiti klausytojai lieka tokie patys
        lightbox.addEventListener('click', function(event) {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });
         lightboxClose.addEventListener('click', function(event) {
             event.stopPropagation();
             closeLightbox();
         });
        lightboxContent.addEventListener('click', function(event) {
             event.stopPropagation();
        });
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && lightbox.style.display === 'flex') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
