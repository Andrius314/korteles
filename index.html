<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <meta name="description" content="Nuolaidų kortelės vienoje vietoje, pasiekiamos ir be interneto.">
  <title>Nuolaidų kortelės</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, .12), transparent 34rem),
        #f3f4f6;
    }

    body.is-locked { overflow: hidden; }

    header {
      padding: 38px 20px 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.9rem, 5vw, 3rem);
      letter-spacing: -.04em;
    }

    .subtitle {
      margin: 10px auto 0;
      color: #6b7280;
      font-size: 1rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 18px;
      width: min(100% - 32px, 1050px);
      margin: 18px auto 48px;
    }

    .card {
      min-height: 150px;
      padding: 14px;
      border: 1px solid rgba(17, 24, 39, .08);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(17, 24, 39, .08);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(37, 99, 235, .28);
      box-shadow: 0 14px 34px rgba(17, 24, 39, .13);
    }

    .card-open:focus-visible,
    .status-toggle:focus-visible,
    .close:focus-visible {
      outline: 3px solid #2563eb;
      outline-offset: 3px;
    }

    .card-open {
      display: block;
      width: 100%;
      padding: 8px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
    }

    .card-open img {
      display: block;
      width: 100%;
      height: 106px;
      object-fit: contain;
      transition: filter .18s ease, opacity .18s ease;
    }

    .card.is-inactive {
      border-color: rgba(220, 38, 38, .3);
    }

    .card.is-inactive .card-open img {
      filter: grayscale(.85);
      opacity: .62;
    }

    .status-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      margin-top: 7px;
      padding: 8px 10px;
      border: 0;
      border-radius: 10px;
      background: #dcfce7;
      color: #166534;
      font: inherit;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .status-toggle::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #16a34a;
      content: '';
    }

    .card.is-inactive .status-toggle {
      background: #fee2e2;
      color: #991b1b;
    }

    .card.is-inactive .status-toggle::before {
      background: #dc2626;
    }

    .lightbox[hidden] { display: none; }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 12px;
      background: rgba(3, 7, 18, .92);
      backdrop-filter: blur(5px);
      animation: fade-in .16s ease-out;
    }

    .dialog {
      position: relative;
      width: min(98vw, 1100px);
      max-height: 96dvh;
      padding: 12px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .4);
    }

    .dialog img {
      display: block;
      width: 100%;
      max-height: calc(96dvh - 24px);
      object-fit: contain;
      border-radius: 10px;
      background: #fff;
    }

    .dialog img.is-barcode {
      height: min(42dvh, 360px);
      object-fit: fill;
    }

    .close {
      position: absolute;
      top: -14px;
      right: -14px;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      padding: 0;
      border: 2px solid #fff;
      border-radius: 50%;
      background: #111827;
      color: #fff;
      font-size: 1.7rem;
      line-height: 1;
      cursor: pointer;
    }

    .connection-status {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 9px 13px;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: .85rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
      transition: opacity .2s ease, transform .2s ease;
    }

    .connection-status[hidden] { display: none; }

    @keyframes fade-in { from { opacity: 0; } }

    @media (max-width: 600px) {
      header { padding-top: 28px; }
      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        width: min(100% - 24px, 1050px);
      }
      .card { min-height: 125px; padding: 10px; border-radius: 14px; }
      .card-open { padding: 4px; }
      .card-open img { height: 88px; }
      .lightbox {
        align-items: stretch;
        padding: 0;
        background: #fff;
      }
      .dialog {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100dvh;
        max-height: none;
        padding: calc(env(safe-area-inset-top) + 46px) 8px calc(env(safe-area-inset-bottom) + 8px);
        border-radius: 0;
        box-shadow: none;
      }
      .dialog img {
        width: 100%;
        max-height: 100%;
        border-radius: 0;
      }
      .dialog img.is-barcode {
        height: min(46dvh, 390px);
        max-height: calc(100dvh - 64px);
        object-fit: fill;
      }
      .close {
        top: max(8px, env(safe-area-inset-top));
        right: 8px;
        border-color: #111827;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Nuolaidų kortelės</h1>
    <p class="subtitle">Paspauskite logotipą, kad parodytumėte kortelę.</p>
  </header>

  <main class="gallery" aria-label="Nuolaidų kortelių sąrašas">
    <article class="card" data-card-id="iki">
      <button class="card-open" type="button" data-card="img/iki.jpg" data-scan="img/iki_scan.png" data-code="barcode" data-name="IKI nuolaidų kortelė">
        <img src="img/iki_logo.png" alt="IKI" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
    <article class="card" data-card-id="maxima">
      <button class="card-open" type="button" data-card="img/maxima.jpg" data-scan="img/maxima_scan.png" data-code="barcode" data-name="Maxima Ačiū kortelė">
        <img src="img/maxima_logo.png" alt="Maxima" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
    <article class="card" data-card-id="lidl">
      <button class="card-open" type="button" data-card="img/lidl.jpg" data-scan="img/lidl_scan.png" data-code="qr" data-name="Lidl Plus kortelė">
        <img src="img/lidl_logo.png" alt="Lidl" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
    <article class="card" data-card-id="norfa">
      <button class="card-open" type="button" data-card="img/norfa.jpg" data-scan="img/norfa_scan.png" data-code="qr" data-name="Norfa nuolaidų kortelė">
        <img src="img/norfa_logo.png" alt="Norfa" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
    <article class="card" data-card-id="promo">
      <button class="card-open" type="button" data-card="img/promo.jpg" data-scan="img/promo_scan.png" data-code="barcode" data-name="Promo Cash&amp;Carry kortelė">
        <img src="img/promo_logo.png" alt="Promo Cash&amp;Carry" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
    <article class="card" data-card-id="senukai">
      <button class="card-open" type="button" data-card="img/senukai.jpg" data-scan="img/senukai_scan.png" data-code="barcode" data-name="Senukai Smart Net kortelė">
        <img src="img/senukai_logo.png" alt="Senukai" width="300" height="200">
      </button>
      <button class="status-toggle" type="button"><span class="status-label">Veikia</span></button>
    </article>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Nuolaidų kortelė" hidden>
    <div class="dialog">
      <button class="close" type="button" aria-label="Uždaryti">&times;</button>
      <img id="card-image" src="" alt="">
    </div>
  </div>

  <div class="connection-status" id="connection-status" role="status" aria-live="polite" hidden></div>

  <script>
    const FIRESTORE_API_KEY = 'AIzaSyBqSIzIL1F7MZdbGVqqsvssh-G5BoI-xxM';
    const FIRESTORE_DOCUMENT_PATH = 'projects/nuolaidu-korteles-314/databases/(default)/documents';
    const FIRESTORE_DOCUMENTS_URL = `https://firestore.googleapis.com/v1/${FIRESTORE_DOCUMENT_PATH}`;

    const lightbox = document.querySelector('#lightbox');
    const cardImage = document.querySelector('#card-image');
    const closeButton = document.querySelector('.close');
    const connectionStatus = document.querySelector('#connection-status');
    let previouslyFocused = null;
    let statusTimer = null;
    let wakeLock = null;

    const STATUS_STORAGE_KEY = 'nuolaidu-korteliu-busenos-v1';
    const PENDING_STORAGE_KEY = 'nuolaidu-korteliu-laukiantys-pakeitimai-v1';

    function loadStatuses() {
      try {
        return JSON.parse(localStorage.getItem(STATUS_STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function saveStatuses(statuses) {
      try {
        localStorage.setItem(STATUS_STORAGE_KEY, JSON.stringify(statuses));
      } catch {
        // Kortelės toliau veiks, net jei naršyklė neleidžia saugoti nustatymų.
      }
    }

    function loadPendingStatuses() {
      try {
        return JSON.parse(localStorage.getItem(PENDING_STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function savePendingStatuses(statuses) {
      try {
        localStorage.setItem(PENDING_STORAGE_KEY, JSON.stringify(statuses));
      } catch {
        // Puslapis ir toliau veiks, net jei naršyklė neleidžia saugoti nustatymų.
      }
    }

    function applyStatus(card, working) {
      const toggle = card.querySelector('.status-toggle');
      const label = card.querySelector('.status-label');
      const cardName = card.querySelector('.card-open img').alt;
      card.dataset.working = String(working);
      card.classList.toggle('is-inactive', !working);
      label.textContent = working ? 'Veikia' : 'Neveikia';
      toggle.setAttribute('aria-label', `${cardName}: ${working ? 'veikia' : 'neveikia'}. Paspauskite būsenai pakeisti.`);
    }

    function openCard(button) {
      previouslyFocused = button;
      cardImage.src = button.dataset.scan || button.dataset.card;
      cardImage.alt = button.dataset.name;
      cardImage.classList.toggle('is-barcode', button.dataset.code === 'barcode');
      lightbox.hidden = false;
      document.body.classList.add('is-locked');
      closeButton.focus();
      void keepScreenAwake();
    }

    function closeCard() {
      if (lightbox.hidden) return;
      lightbox.hidden = true;
      cardImage.src = '';
      cardImage.alt = '';
      cardImage.classList.remove('is-barcode');
      document.body.classList.remove('is-locked');
      releaseWakeLock();
      previouslyFocused?.focus();
    }

    async function keepScreenAwake() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
      } catch {
        // Jei naršyklė nepalaiko ekrano palaikymo, kortelė vis tiek rodoma įprastai.
      }
    }

    function releaseWakeLock() {
      if (!wakeLock) return;
      wakeLock.release().catch(() => {});
      wakeLock = null;
    }

    document.querySelectorAll('.card-open').forEach((button) => {
      button.addEventListener('click', () => openCard(button));
    });

    const savedStatuses = loadStatuses();
    const pendingStatuses = loadPendingStatuses();
    let isSyncing = false;

    async function writeStatus(id, working) {
      const response = await fetch(`${FIRESTORE_DOCUMENTS_URL}:commit?key=${FIRESTORE_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          writes: [{
            update: {
              name: `${FIRESTORE_DOCUMENT_PATH}/cardStatuses/${id}`,
              fields: { working: { booleanValue: working } }
            },
            updateMask: { fieldPaths: ['working'] },
            updateTransforms: [{
              fieldPath: 'updatedAt',
              setToServerValue: 'REQUEST_TIME'
            }]
          }]
        })
      });
      if (!response.ok) throw new Error(`Firestore write failed: ${response.status}`);
    }

    async function syncPendingStatuses() {
      if (!navigator.onLine || isSyncing) return;
      isSyncing = true;
      try {
        for (const [id, working] of Object.entries({ ...pendingStatuses })) {
          await writeStatus(id, working);
          if (pendingStatuses[id] === working) delete pendingStatuses[id];
          savePendingStatuses(pendingStatuses);
        }
      } catch (error) {
        console.error('Nepavyko sinchronizuoti kortelių būsenų:', error);
        showConnectionStatus('Būsena bus išsaugota atkūrus ryšį');
      } finally {
        isSyncing = false;
      }
    }

    async function refreshStatuses() {
      if (!navigator.onLine) return;
      try {
        const response = await fetch(`${FIRESTORE_DOCUMENTS_URL}/cardStatuses?key=${FIRESTORE_API_KEY}`, {
          cache: 'no-store'
        });
        if (!response.ok) throw new Error(`Firestore read failed: ${response.status}`);
        const data = await response.json();
        for (const statusDocument of data.documents || []) {
          const id = statusDocument.name.split('/').pop();
          const working = statusDocument.fields?.working?.booleanValue;
          const card = document.querySelector(`[data-card-id="${id}"]`);
          if (!card || typeof working !== 'boolean' || id in pendingStatuses) continue;
          applyStatus(card, working);
          savedStatuses[id] = working;
        }
        saveStatuses(savedStatuses);
      } catch (error) {
        console.error('Nepavyko gauti kortelių būsenų:', error);
        showConnectionStatus('Rodomos paskutinės išsaugotos būsenos');
      }
    }

    document.querySelectorAll('.card').forEach((card) => {
      const id = card.dataset.cardId;
      applyStatus(card, savedStatuses[id] !== false);
      card.querySelector('.status-toggle').addEventListener('click', () => {
        const working = card.dataset.working !== 'true';
        applyStatus(card, working);
        savedStatuses[id] = working;
        saveStatuses(savedStatuses);
        pendingStatuses[id] = working;
        savePendingStatuses(pendingStatuses);
        void syncPendingStatuses();
      });
    });

    void refreshStatuses().finally(syncPendingStatuses);
    setInterval(refreshStatuses, 15000);

    closeButton.addEventListener('click', closeCard);
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeCard();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeCard();
    });

    function showConnectionStatus(message) {
      clearTimeout(statusTimer);
      connectionStatus.textContent = message;
      connectionStatus.hidden = false;
      statusTimer = setTimeout(() => { connectionStatus.hidden = true; }, 3200);
    }

    window.addEventListener('offline', () => showConnectionStatus('Veikiama be interneto'));
    window.addEventListener('online', async () => {
      showConnectionStatus('Interneto ryšys atkurtas');
      await syncPendingStatuses();
      await refreshStatuses();
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          await navigator.serviceWorker.register('./sw.js');
        } catch (error) {
          console.error('Nepavyko įjungti darbo be interneto:', error);
        }
      });
    }
  </script>
</body>
</html>
